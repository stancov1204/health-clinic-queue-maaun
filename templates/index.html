<!DOCTYPE html>
<html>
<head>
    <title>MAUUN Clinic Queue</title>
    <style>
        body { font-family: Arial; text-align: center; }
        ul { list-style: none; padding: 0; }
        li { background: #f0f0f0; margin: 10px; padding: 10px; border-radius: 8px; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; }
    </style>
</head>
<body>
    <h1>🏥 Health Clinic Queue Manager maaun</h1>
    <h2>Patients Waiting: {{ queue|length }}</h2>
    
    <ul>
        {% for patient in queue %}
            <li>{{ patient.get_info() }}</li>
        {% endfor %}
    </ul>
    
    <h2>✅ Patients Seen Today: {{ seen_today }}</h2>
    
    <a href="/register"><button style="background:green;color:white">Register New Patient</button></a>
    <a href="/serve"><button style="background:red;color:white">Call Next Patient</button></a>
</body>
</html>
